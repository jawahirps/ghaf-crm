// ─── CONTEXT ──────────────────────────────────────────────────────────────────
const CRMContext = createContext();

function CRMProvider({ children }) {
  const [contacts,   setContacts]   = useState(initialContacts);
  const [leads,      setLeads]      = useState(initialLeads);
  const [deals,      setDeals]      = useState(initialDeals);
  const [accounts,   setAccounts]   = useState(initialAccounts);
  const [activities, setActivities] = useState(initialActivities);

  const addRecord    = (type, rec) => {
    const setters = { contacts:setContacts, leads:setLeads, deals:setDeals, accounts:setAccounts, activities:setActivities };
    const lists   = { contacts, leads, deals, accounts, activities };
    const newId   = Math.max(0, ...lists[type].map(r=>r.id)) + 1;
    setters[type](prev => [...prev, { ...rec, id: newId }]);
  };
  const updateRecord = (type, rec) => {
    const setters = { contacts:setContacts, leads:setLeads, deals:setDeals, accounts:setAccounts, activities:setActivities };
    setters[type](prev => prev.map(r => r.id === rec.id ? rec : r));
  };
  const deleteRecord = (type, id) => {
    const setters = { contacts:setContacts, leads:setLeads, deals:setDeals, accounts:setAccounts, activities:setActivities };
    setters[type](prev => prev.filter(r => r.id !== id));
  };

  return (
    <CRMContext.Provider value={{ contacts, leads, deals, accounts, activities, addRecord, updateRecord, deleteRecord }}>
      {children}
    </CRMContext.Provider>
  );
}

function LeadSourceChart({ leads }) {
  const sources = {};
  leads.forEach(l => { sources[l.source] = (sources[l.source]||0) + 1; });
  const entries = Object.entries(sources).sort((a,b)=>b[1]-a[1]);
  const total   = leads.length;
  const colors  = ['#22c55e','#3b82f6','#8b5cf6','#f59e0b','#ef4444','#06b6d4','#ec4899'];
  let pct = 0;
  return (
    <div className="space-y-2">
      <div className="flex justify-center">
        <svg viewBox="0 0 100 100" className="w-28 h-28 -rotate-90">
          {entries.map((e,i) => {
            const p = (e[1]/total)*100;
            const el = (
              <circle key={e[0]} cx="50" cy="50" r="40"
                fill="none" stroke={colors[i%colors.length]} strokeWidth="18"
                strokeDasharray={`${(p/100)*251.2} ${251.2}`}
                strokeDashoffset={`-${(pct/100)*251.2}`} />
            );
            pct += p;
            return el;
          })}
          <circle cx="50" cy="50" r="31" fill="white" />
        </svg>
      </div>
      {entries.map((e,i) => (
        <div key={e[0]} className="flex items-center justify-between text-xs">
          <div className="flex items-center gap-2">
            <div className="w-2.5 h-2.5 rounded-full" style={{ background: colors[i%colors.length] }}></div>
            <span className="text-slate-600">{e[0]}</span>
          </div>
          <span className="font-semibold text-slate-700">{e[1]}</span>
        </div>
      ))}
    </div>
  );
}

// ─── DEALS KANBAN ─────────────────────────────────────────────────────────────

function Deals() {
  const { deals, addRecord, updateRecord, deleteRecord } = useContext(CRMContext);
  const [modal, setModal] = useState(null);
  const [sel,   setSel]   = useState(null);
  const emptyForm = { name:'', contact:'', company:'', value:'', stage:'Prospecting', probability:20, close:'', owner:'Rashed' };
  const [form, setForm]   = useState(emptyForm);

  const kanbanStages = dealStages.slice(0,4);

  const openAdd  = (stage='Prospecting') => { setForm({...emptyForm,stage}); setModal('add'); };
  const openEdit = d => { setForm({...d}); setSel(d); setModal('edit'); };

  const save = () => {
    const rec = { ...form, value: parseInt(form.value)||0, probability: parseInt(form.probability)||0 };
    if (modal==='add') addRecord('deals', rec);
    else updateRecord('deals', { ...sel, ...rec });
    setModal(null);
  };

  const move = (deal, dir) => {
    const idx = dealStages.indexOf(deal.stage);
    const next = dealStages[idx+dir];
    if (next) updateRecord('deals', { ...deal, stage: next, probability: [20,40,60,80,100,0][dealStages.indexOf(next)] });
  };

  const stageColors = {
    'Prospecting':'bg-slate-50 border-slate-200',
    'Qualification':'bg-blue-50 border-blue-200',
    'Proposal':'bg-violet-50 border-violet-200',
    'Negotiation':'bg-amber-50 border-amber-200',
    'Closed Won':'bg-emerald-50 border-emerald-200',
    'Closed Lost':'bg-red-50 border-red-200',
  };
  const stageHeader = {
    'Prospecting':'bg-slate-200 text-slate-700',
    'Qualification':'bg-blue-100 text-blue-700',
    'Proposal':'bg-violet-100 text-violet-700',
    'Negotiation':'bg-amber-100 text-amber-700',
    'Closed Won':'bg-emerald-100 text-emerald-700',
    'Closed Lost':'bg-red-100 text-red-600',
  };

  return (
    <div>
      <TopBar title="Deals Pipeline">
        <button onClick={()=>openAdd()} className="bg-ghaf-600 hover:bg-ghaf-700 text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-sm">+ Add Deal</button>
      </TopBar>

      <div className="p-6 overflow-x-auto">
        <div className="flex gap-4 min-w-max">
          {dealStages.map(stage => {
            const col = deals.filter(d=>d.stage===stage);
            const total = col.reduce((a,d)=>a+d.value,0);
            return (
              <div key={stage} className={`w-72 flex-shrink-0 rounded-2xl border ${stageColors[stage]} kanban-col`}>
                <div className={`px-4 py-3 rounded-t-2xl ${stageHeader[stage]} flex items-center justify-between`}>
                  <div>
                    <span className="font-semibold text-sm">{stage}</span>
                    <span className="ml-2 text-xs opacity-70">{col.length}</span>
                  </div>
                  <div className="text-xs font-semibold opacity-80">{fmt(total)}</div>
                </div>
                <div className="p-3 space-y-3">
                  {col.map(d=>(
                    <div key={d.id} className="bg-white rounded-xl p-3 shadow-sm card-hover border border-white">
                      <div className="flex items-start justify-between mb-2">
                        <h4 className="font-semibold text-slate-800 text-sm leading-tight pr-2">{d.name}</h4>
                        <div className="flex gap-1 flex-shrink-0">
                          <button onClick={()=>openEdit(d)} className="text-slate-300 hover:text-ghaf-500 text-xs">✏️</button>
                          <button onClick={()=>deleteRecord('deals',d.id)} className="text-slate-300 hover:text-red-400 text-xs">🗑️</button>
                        </div>
                      </div>
                      <div className="text-xs text-slate-400 mb-2">{d.contact} · {d.company}</div>
                      <div className="flex items-center justify-between">
                        <span className="font-bold text-ghaf-700 text-sm">{fmt(d.value)}</span>
                        <span className="text-xs text-slate-400">{d.close}</span>
                      </div>
                      <div className="mt-2">
                        <div className="flex items-center justify-between text-xs text-slate-400 mb-1">
                          <span>{d.owner}</span>
                          <span>{d.probability}%</span>
                        </div>
                        <div className="bg-slate-100 rounded-full h-1">
                          <div className="h-1 rounded-full bg-ghaf-500" style={{width:`${d.probability}%`}}></div>
                        </div>
                      </div>
                      <div className="flex gap-1 mt-2">
                        {dealStages.indexOf(d.stage)>0 && dealStages.indexOf(d.stage)<dealStages.length-1 &&
                          <button onClick={()=>move(d,-1)} className="text-xs px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-500">← Back</button>}
                        {dealStages.indexOf(d.stage)<dealStages.length-2 &&
                          <button onClick={()=>move(d,1)} className="text-xs px-2 py-0.5 bg-ghaf-100 hover:bg-ghaf-200 rounded text-ghaf-700">Advance →</button>}
                      </div>
                    </div>
                  ))}
                  <button onClick={()=>openAdd(stage)} className="w-full py-2 text-xs text-slate-400 hover:text-ghaf-600 hover:bg-white/60 rounded-xl transition-colors">+ Add deal</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {(modal==='add'||modal==='edit') && (
        <Modal title={modal==='add'?'Add Deal':'Edit Deal'} onClose={()=>setModal(null)}>
          <div className="grid grid-cols-2 gap-4">
            <div className="col-span-2"><Input label="Deal Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} /></div>
            <Input label="Contact" value={form.contact} onChange={e=>setForm({...form,contact:e.target.value})} />
            <Input label="Company" value={form.company} onChange={e=>setForm({...form,company:e.target.value})} />
            <Input label="Value (AED)" type="number" value={form.value} onChange={e=>setForm({...form,value:e.target.value})} />
            <Input label="Probability (%)" type="number" min="0" max="100" value={form.probability} onChange={e=>setForm({...form,probability:e.target.value})} />
            <Select label="Stage" options={dealStages} value={form.stage} onChange={e=>setForm({...form,stage:e.target.value})} />
            <Input label="Close Date" type="date" value={form.close} onChange={e=>setForm({...form,close:e.target.value})} />
            <Input label="Owner" value={form.owner} onChange={e=>setForm({...form,owner:e.target.value})} />
          </div>
          <div className="flex justify-end gap-3 mt-6">
            <button onClick={()=>setModal(null)} className="px-4 py-2 rounded-xl border border-slate-200 text-sm text-slate-600">Cancel</button>
            <button onClick={save} className="px-5 py-2 rounded-xl bg-ghaf-600 text-white text-sm font-semibold">Save</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── ACCOUNTS ─────────────────────────────────────────────────────────────────

function Accounts() {
  const { accounts, addRecord, updateRecord, deleteRecord } = useContext(CRMContext);
  const [search, setSearch] = useState('');
  const [modal,  setModal]  = useState(null);
  const [sel,    setSel]    = useState(null);
  const emptyForm = { name:'', industry:'', employees:'', revenue:'', website:'', phone:'', status:'Prospect', contacts:0, deals:0, owner:'Rashed' };
  const [form, setForm]     = useState(emptyForm);

  const filtered = accounts.filter(a =>
    a.name.toLowerCase().includes(search.toLowerCase()) ||
    a.industry.toLowerCase().includes(search.toLowerCase())
  );

  const openAdd  = () => { setForm(emptyForm); setModal('add'); };
  const openEdit = a => { setForm({...a}); setSel(a); setModal('edit'); };
  const openView = a => { setSel(a); setModal('view'); };

  const save = () => {
    const rec = { ...form, employees: parseInt(form.employees)||0 };
    if (modal==='add') addRecord('accounts', rec);
    else updateRecord('accounts', { ...sel, ...rec });
    setModal(null);
  };

  const industryIcon = ind => ({'Aviation':'✈️','Telecom':'📡','Oil & Gas':'🛢️','Utilities':'⚡','Investment':'💰','Finance':'🏦','Government':'🏛️','Gov-Tech':'💻'}[ind]||'🏢');

  return (
    <div>
      <TopBar title="Accounts">
        <SearchBar value={search} onChange={setSearch} placeholder="Search accounts…" />
        <button onClick={openAdd} className="bg-ghaf-600 hover:bg-ghaf-700 text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-sm">+ Add Account</button>
      </TopBar>

      <div className="p-6">
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          {filtered.map(a => (
            <div key={a.id} className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 card-hover cursor-pointer" onClick={()=>openView(a)}>
              <div className="flex items-start justify-between mb-3">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-xl">{industryIcon(a.industry)}</div>
                  <div>
                    <h3 className="font-semibold text-slate-800">{a.name}</h3>
                    <p className="text-xs text-slate-400">{a.industry}</p>
                  </div>
                </div>
                <Badge label={a.status} />
              </div>
              <div className="grid grid-cols-2 gap-2 text-xs text-slate-500 mb-3">
                <div>👤 {a.employees?.toLocaleString()} employees</div>
                <div>💰 {a.revenue}</div>
                <div>📞 {a.contacts} contacts</div>
                <div>💼 {a.deals} deals</div>
              </div>
              <div className="flex items-center justify-between pt-3 border-t border-slate-100">
                <span className="text-xs text-slate-400">Owner: {a.owner}</span>
                <div className="flex gap-2" onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>openEdit(a)} className="text-slate-400 hover:text-ghaf-600 text-sm">✏️</button>
                  <button onClick={()=>deleteRecord('accounts',a.id)} className="text-slate-400 hover:text-red-500 text-sm">🗑️</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {(modal==='add'||modal==='edit') && (
        <Modal title={modal==='add'?'Add Account':'Edit Account'} onClose={()=>setModal(null)}>
          <div className="grid grid-cols-2 gap-4">
            <div className="col-span-2"><Input label="Account Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} /></div>
            <Select label="Industry" options={['Aviation','Telecom','Oil & Gas','Utilities','Investment','Finance','Government','Technology','Healthcare','Real Estate']} value={form.industry} onChange={e=>setForm({...form,industry:e.target.value})} />
            <Select label="Status" options={['Customer','Prospect','Inactive']} value={form.status} onChange={e=>setForm({...form,status:e.target.value})} />
            <Input label="Employees" type="number" value={form.employees} onChange={e=>setForm({...form,employees:e.target.value})} />
            <Input label="Revenue" value={form.revenue} onChange={e=>setForm({...form,revenue:e.target.value})} placeholder="AED 1B" />
            <Input label="Website" value={form.website} onChange={e=>setForm({...form,website:e.target.value})} />
            <Input label="Phone" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} />
            <Input label="Owner" value={form.owner} onChange={e=>setForm({...form,owner:e.target.value})} />
          </div>
          <div className="flex justify-end gap-3 mt-6">
            <button onClick={()=>setModal(null)} className="px-4 py-2 rounded-xl border border-slate-200 text-sm text-slate-600">Cancel</button>
            <button onClick={save} className="px-5 py-2 rounded-xl bg-ghaf-600 text-white text-sm font-semibold">Save</button>
          </div>
        </Modal>
      )}

      {modal==='view' && sel && (
        <Modal title="Account Details" onClose={()=>setModal(null)} wide>
          <div className="space-y-4">
            <div className="flex items-center gap-4">
              <div className="w-14 h-14 bg-slate-100 rounded-2xl flex items-center justify-center text-3xl">{({'Aviation':'✈️','Telecom':'📡','Oil & Gas':'🛢️','Utilities':'⚡','Investment':'💰','Finance':'🏦','Government':'🏛️'}[sel.industry]||'🏢')}</div>
              <div>
                <h2 className="text-xl font-bold text-slate-800">{sel.name}</h2>
                <p className="text-slate-500">{sel.industry}</p>
                <Badge label={sel.status} />
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3 text-sm">
              {[['Employees',sel.employees?.toLocaleString()],['Revenue',sel.revenue],['Website',sel.website],['Phone',sel.phone],['Contacts',sel.contacts],['Deals',sel.deals],['Owner',sel.owner]].map(([l,v])=>(
                <div key={l} className="bg-slate-50 rounded-xl p-3">
                  <div className="text-xs text-slate-400 mb-0.5">{l}</div>
                  <div className="font-medium text-slate-700">{v}</div>
                </div>
              ))}
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── ACTIVITIES ───────────────────────────────────────────────────────────────

function Activities() {
  const { activities, addRecord, updateRecord, deleteRecord } = useContext(CRMContext);
  const [search, setSearch]   = useState('');
  const [typeFilter, setTypeF] = useState('All');
  const [modal,  setModal]    = useState(null);
  const [sel,    setSel]      = useState(null);
  const emptyForm = { type:'Call', subject:'', contact:'', date:'', time:'', status:'Scheduled', duration:'', notes:'' };
  const [form, setForm]       = useState(emptyForm);

  const filtered = activities.filter(a =>
    (typeFilter==='All'||a.type===typeFilter) &&
    (a.subject.toLowerCase().includes(search.toLowerCase())||a.contact.toLowerCase().includes(search.toLowerCase()))
  );

  const openAdd  = () => { setForm({...emptyForm, date: new Date().toISOString().split('T')[0]}); setModal('add'); };
  const openEdit = a => { setForm({...a}); setSel(a); setModal('edit'); };

  const save = () => {
    if (modal==='add') addRecord('activities', form);
    else updateRecord('activities', { ...sel, ...form });
    setModal(null);
  };

  const grouped = { Scheduled:[], Pending:[], Completed:[] };
  filtered.forEach(a => grouped[a.status] && grouped[a.status].push(a));

  return (
    <div>
      <TopBar title="Activities">
        <SearchBar value={search} onChange={setSearch} placeholder="Search activities…" />
        <div className="flex gap-1">
          {['All',...activityTypes].map(t=>(
            <button key={t} onClick={()=>setTypeF(t)}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${typeFilter===t?'bg-ghaf-600 text-white':'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
              {t!=='All'&&<span className="mr-1">{typeIcon(t)}</span>}{t}
            </button>
          ))}
        </div>
        <button onClick={openAdd} className="bg-ghaf-600 hover:bg-ghaf-700 text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-sm">+ Log Activity</button>
      </TopBar>

      <div className="p-6 space-y-6">
        {Object.entries(grouped).map(([status, items]) => items.length>0 && (
          <div key={status}>
            <h3 className="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wide">{status} ({items.length})</h3>
            <div className="space-y-2">
              {items.sort((a,b)=>a.date.localeCompare(b.date)).map(a=>(
                <div key={a.id} className="bg-white rounded-xl p-4 shadow-sm border border-slate-100 flex items-center gap-4 card-hover">
                  <div className="text-2xl">{typeIcon(a.type)}</div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="font-medium text-slate-800">{a.subject}</span>
                      <Badge label={a.type} color="bg-slate-100 text-slate-600" />
                    </div>
                    <div className="text-xs text-slate-400 mt-0.5">{a.contact} · {a.date} {a.time} {a.duration&&`· ${a.duration}`}</div>
                    {a.notes && <div className="text-xs text-slate-500 mt-1 italic">"{a.notes}"</div>}
                  </div>
                  <Badge label={a.status} />
                  <div className="flex gap-2">
                    <button onClick={()=>openEdit(a)} className="text-slate-400 hover:text-ghaf-600">✏️</button>
                    <button onClick={()=>deleteRecord('activities',a.id)} className="text-slate-400 hover:text-red-500">🗑️</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
        {filtered.length===0 && <div className="text-center text-slate-400 py-16">No activities found</div>}
      </div>

      {(modal==='add'||modal==='edit') && (
        <Modal title={modal==='add'?'Log Activity':'Edit Activity'} onClose={()=>setModal(null)}>
          <div className="grid grid-cols-2 gap-4">
            <Select label="Type" options={activityTypes} value={form.type} onChange={e=>setForm({...form,type:e.target.value})} />
            <Select label="Status" options={activityStatuses} value={form.status} onChange={e=>setForm({...form,status:e.target.value})} />
            <div className="col-span-2"><Input label="Subject" value={form.subject} onChange={e=>setForm({...form,subject:e.target.value})} /></div>
            <Input label="Contact" value={form.contact} onChange={e=>setForm({...form,contact:e.target.value})} />
            <Input label="Duration" value={form.duration} onChange={e=>setForm({...form,duration:e.target.value})} placeholder="30 min" />
            <Input label="Date" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} />
            <Input label="Time" type="time" value={form.time} onChange={e=>setForm({...form,time:e.target.value})} />
            <div className="col-span-2">
              <Field label="Notes">
                <textarea className={inputCls} rows="3" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} />
              </Field>
            </div>
          </div>
          <div className="flex justify-end gap-3 mt-6">
            <button onClick={()=>setModal(null)} className="px-4 py-2 rounded-xl border border-slate-200 text-sm text-slate-600">Cancel</button>
            <button onClick={save} className="px-5 py-2 rounded-xl bg-ghaf-600 text-white text-sm font-semibold">Save</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── REPORTS ──────────────────────────────────────────────────────────────────

function Reports() {
  const { contacts, leads, deals, activities } = useContext(CRMContext);

  const dealsByStage   = dealStages.map(s=>({ label:s, value:deals.filter(d=>d.stage===s).length }));
  const leadsByStage   = leadStages.map(s=>({ label:s, value:leads.filter(l=>l.stage===s).length }));
  const winRate        = deals.filter(d=>d.stage==='Closed Won').length / (deals.filter(d=>['Closed Won','Closed Lost'].includes(d.stage)).length || 1) * 100;
  const actByType      = activityTypes.map(t=>({ label:t, value:activities.filter(a=>a.type===t).length }));
  const topDeals       = [...deals].sort((a,b)=>b.value-a.value).slice(0,5);
  const months         = ['Jan','Feb','Mar','Apr'];
  const monthlyDeals   = [3,5,4,6];
  const maxMD          = Math.max(...monthlyDeals);
  const ownerPerf      = ['Rashed','Layla','Sara'].map(o=>({ name:o, deals:deals.filter(d=>d.owner===o).length, value:deals.filter(d=>d.owner===o).reduce((a,d)=>a+d.value,0) }));

  return (
    <div>
      <TopBar title="Reports & Analytics" />
      <div className="p-6 space-y-6">
        {/* Top KPIs */}
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
          <KpiCard label="Win Rate"         value={`${winRate.toFixed(0)}%`}  sub="Closed Won / Total Closed" icon="🎯" color="bg-emerald-50" />
          <KpiCard label="Avg Deal Size"     value={fmt(deals.reduce((a,d)=>a+d.value,0)/deals.length|0)} sub="All deals" icon="💰" color="bg-blue-50" />
          <KpiCard label="Total Pipeline"    value={fmt(deals.filter(d=>!['Closed Won','Closed Lost'].includes(d.stage)).reduce((a,d)=>a+d.value,0))} sub="Open deals" icon="📈" color="bg-violet-50" />
          <KpiCard label="Activities Logged" value={activities.length} sub="All time" icon="📋" color="bg-amber-50" />
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
          {/* Deals by Stage */}
          <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 className="font-semibold text-slate-700 mb-4">Deals by Stage</h3>
            <div className="space-y-2">
              {dealsByStage.map(s=>(
                <div key={s.label} className="flex items-center gap-3">
                  <div className="w-28 text-xs text-slate-500 truncate">{s.label}</div>
                  <div className="flex-1 bg-slate-100 rounded-full h-4">
                    <div className="h-4 rounded-full bg-ghaf-500 flex items-center px-2 min-w-[20px]"
                         style={{width:`${Math.max((s.value/deals.length)*100,s.value?8:0)}%`}}>
                      <span className="text-white text-xs font-bold">{s.value}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Activity breakdown */}
          <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 className="font-semibold text-slate-700 mb-4">Activity Breakdown</h3>
            <div className="grid grid-cols-2 gap-3">
              {actByType.map((a,i)=>{
                const colors = ['bg-emerald-500','bg-blue-500','bg-violet-500','bg-amber-500'];
                return (
                  <div key={a.label} className="bg-slate-50 rounded-xl p-4 text-center">
                    <div className="text-2xl mb-1">{typeIcon(a.label)}</div>
                    <div className="text-2xl font-bold text-slate-700">{a.value}</div>
                    <div className="text-xs text-slate-500">{a.label}s</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
          {/* Monthly activity */}
          <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 className="font-semibold text-slate-700 mb-4">New Deals per Month</h3>
            <div className="flex items-end gap-4 h-36">
              {months.map((m,i)=>(
                <div key={m} className="flex-1 flex flex-col items-center gap-1">
                  <div className="text-xs font-semibold text-slate-600">{monthlyDeals[i]}</div>
                  <div className="w-full rounded-t-lg bg-gradient-to-t from-blue-600 to-blue-400 chart-bar"
                       style={{height:`${(monthlyDeals[i]/maxMD)*100}px`}}></div>
                  <div className="text-xs text-slate-400">{m}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Team performance */}
          <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 className="font-semibold text-slate-700 mb-4">Team Performance</h3>
            <div className="space-y-3">
              {ownerPerf.sort((a,b)=>b.value-a.value).map((o,i)=>(
                <div key={o.name} className="flex items-center gap-3">
                  <div className="flex items-center gap-2 w-24">
                    <span className="text-base">{['🥇','🥈','🥉'][i]}</span>
                    <span className="font-medium text-slate-700 text-sm">{o.name}</span>
                  </div>
                  <div className="flex-1 bg-slate-100 rounded-full h-4">
                    <div className="h-4 rounded-full bg-gradient-to-r from-ghaf-600 to-ghaf-400"
                         style={{width:`${(o.value/Math.max(...ownerPerf.map(x=>x.value)))*100}%`}}></div>
                  </div>
                  <div className="text-xs font-semibold text-slate-600 w-20 text-right">{fmt(o.value)}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Top Deals Table */}
        <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
          <h3 className="font-semibold text-slate-700 mb-4">Top 5 Deals by Value</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="text-xs text-slate-500 border-b border-slate-100">
                {['#','Deal','Company','Stage','Value','Probability','Owner'].map(h=>(
                  <th key={h} className="text-left py-2 font-medium">{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {topDeals.map((d,i)=>(
                  <tr key={d.id} className="border-b border-slate-50 hover:bg-slate-50/60">
                    <td className="py-3 text-slate-400 font-bold">#{i+1}</td>
                    <td className="py-3 font-medium text-slate-700">{d.name}</td>
                    <td className="py-3 text-slate-500">{d.company}</td>
                    <td className="py-3"><Badge label={d.stage} /></td>
                    <td className="py-3 font-bold text-ghaf-700">{fmt(d.value)}</td>
                    <td className="py-3">
                      <div className="flex items-center gap-2">
                        <div className="w-16 bg-slate-100 rounded-full h-1.5">
                          <div className="h-1.5 rounded-full bg-ghaf-500" style={{width:`${d.probability}%`}}></div>
                        </div>
                        <span className="text-xs text-slate-500">{d.probability}%</span>
                      </div>
                    </td>
                    <td className="py-3 text-slate-500">{d.owner}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [page, setPage] = useState('dashboard');

  const pages = {
    dashboard:  <Dashboard />,
    contacts:   <Contacts />,
    leads:      <Leads />,
    deals:      <Deals />,
    accounts:   <Accounts />,
    activities: <Activities />,
    reports:    <Reports />,
  };

  return (
    <CRMProvider>
      <div className="flex min-h-screen">
        <Sidebar active={page} setActive={setPage} />
        <div className="flex-1 flex flex-col overflow-hidden">
          <div className="flex-1 overflow-y-auto">
            {pages[page]}
          </div>
        </div>
      </div>
    </CRMProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
